<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TiFgames</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #333;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

.container {
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
}

header {
  text-align: center;
  padding: 40px 20px 30px;
  color: white;
}

header h1 {
  font-size: 48px;
  margin-bottom: 10px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

header p {
  font-size: 18px;
  opacity: 0.95;
  font-weight: 400;
}

.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  margin-bottom: 40px;
  padding: 20px;
}

.game-card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  transition: all 0.3s ease;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  cursor: pointer;
}

.game-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.25);
}

.game-icon {
  font-size: 60px;
  text-align: center;
  padding: 30px 20px 10px;
  background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%);
}

.game-content {
  padding: 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.game-content h2 {
  font-size: 20px;
  margin-bottom: 8px;
  color: #333;
  font-weight: 600;
}

.game-content p {
  font-size: 14px;
  color: #666;
  margin-bottom: 12px;
  flex: 1;
}

.game-link {
  display: inline-block;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 10px 16px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 14px;
  text-decoration: none;
  transition: all 0.3s ease;
  align-self: flex-start;
  margin-top: auto;
}

.game-link:hover {
  box-shadow: 0 4px 12px rgba(102,126,234,0.4);
  transform: scale(1.05);
}

.game-repo {
  font-size: 12px;
  color: #999;
  margin-top: 8px;
}

.categories {
  background: white;
  border-radius: 16px;
  padding: 30px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  margin-bottom: 40px;
}

.categories h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
  font-weight: 600;
}

.category-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 16px;
}

.category-item {
  padding: 16px;
  background: #f5f5f5;
  border-radius: 12px;
  border-left: 4px solid #667eea;
}

.category-item h3 {
  margin-bottom: 8px;
  color: #333;
  font-size: 16px;
  font-weight: 600;
}

.category-item ul {
  list-style: none;
  font-size: 14px;
  color: #666;
}

.category-item li {
  padding: 4px 0;
}

footer {
  text-align: center;
  color: white;
  padding: 30px 20px;
  font-size: 14px;
  opacity: 0.9;
}

footer a {
  color: white;
  text-decoration: none;
  font-weight: 600;
  border-bottom: 2px solid rgba(255,255,255,0.3);
}

footer a:hover {
  border-bottom-color: white;
}

@media (max-width: 768px) {
  header h1 { font-size: 32px; }
  .games-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🎮 TiFgames</h1>
    <p>Made by Scainet</p>
  </header>

  <div class="games-grid" id="gamesGrid"></div>

  <div class="categories">
    <h2>📚 Game Categories</h2>
    <div class="category-list" id="categoriesView"></div>
  </div>
</div>

<footer>
  <p>🧠 Learning Through Play</p>
  <p style="margin-top: 10px; opacity: 0.8;">Built with HTML5 • Touch-Friendly • Multiple Languages</p>
  <p style="margin-top: 10px;">
    <a href="https://github.com/TiFcode" target="_blank">TiFcode on GitHub</a>
  </p>
</footer>

<script>
const GAMES = [
  { id: 'piano3', name: 'TiFpiano3', icon: '🟢', description: 'Expanded piano trainer with instant song selection and guided learn mode.', url: 'https://tifcode.github.io/TiFpiano3/', repo: 'TiFcode/TiFpiano3', category: 'Music & Sound' },
  { id: 'piano2', name: 'TiFpiano2', icon: '🎹', description: 'Learn Twinkle Twinkle with falling notes, realistic piano keys, and guided key-by-key play.', url: 'https://tifcode.github.io/TiFpiano2/', repo: 'TiFcode/TiFpiano2', category: 'Music & Sound' },
  { id: 'gears', name: 'TiFgears', icon: '⚙️', description: 'Interactive gear simulation. Pull gears to watch them spin and interact realistically.', url: 'https://tifcode.github.io/TiFgears/', repo: 'TiFcode/TiFgears', category: 'Physics & Simulation' },
  { id: 'phototable', name: 'TiFphototable', icon: '🖼️', description: 'Interactive photo table. Drag, toss, rotate, and explore photos on a playful tabletop canvas.', url: 'https://tifcode.github.io/TiFphototable/', repo: 'TiFcode/TiFphototable', category: 'Media & Creativity' },
  { id: 'circles', name: 'TiFcircles', icon: '🟣', description: 'Tap only the biggest animated circle at that moment. Each level adds one more breathing disc.', url: 'https://tifcode.github.io/TiFcircles/', repo: 'TiFcode/TiFcircles', category: 'Focus & Reflexes' },
  { id: 'colors', name: 'TiFcolors', icon: '🎨', description: 'Color mixing lab. Learn color theory by mixing primary colors.', url: 'https://tifcode.github.io/TiFcolors/', repo: 'TiFcode/TiFcolors', category: 'Art & Creativity' },
  { id: 'memory', name: 'TiFmemory', icon: '🧠', description: 'Memory matching game for kids. Flip cards, find pairs, and train visual memory.', url: 'https://tifcode.github.io/TiFmemory/', repo: 'TiFcode/TiFmemory', category: 'Memory & Matching' },
  { id: 'clone', name: 'TiFclone', icon: '🧩', description: 'Clonează modelul triunghiurilor din imagine. Joc vizual de logică pentru copii, inspirat din fișa de lucru.', url: 'https://tifcode.github.io/TiFclone/', repo: 'TiFcode/TiFclone', category: 'Pattern & Logic' },
  { id: 'halves', name: 'TiFhalves', icon: '🧸', description: 'Găsește jumătățile potrivite ale jucăriilor. Joc de potrivire vizuală inspirat din fișa de lucru cu jucării.', url: 'https://tifcode.github.io/TiFhalves/', repo: 'TiFcode/TiFhalves', category: 'Pattern & Logic' },
  { id: 'syllables', name: 'TiFsyllables', icon: '🔤', description: 'Potrivește silabele și formează cuvinte. Joc de citire timpurie cu pronunție și feedback audio.', url: 'https://tifcode.github.io/TiFsyllables/', repo: 'TiFcode/TiFsyllables', category: 'Language Learning' },
  { id: 'puzzle', name: 'TiFpuzzle', icon: '🧩', description: 'Sliding tile puzzle. Drag tiles to solve the picture puzzle.', url: 'https://tifcode.github.io/TiFpuzzle/', repo: 'TiFcode/TiFpuzzle', category: 'Puzzles' },
  { id: 'math', name: 'TiFmath', icon: '🔢', description: 'Visual math learning. Count objects to learn basic arithmetic.', url: 'https://tifcode.github.io/TiFmath/', repo: 'TiFcode/TiFmath', category: 'Math & Counting' },
  { id: 'maze', name: 'TiFmaze', icon: '🗺️', description: 'Maze runner. Swipe to navigate themed mazes.', url: 'https://tifcode.github.io/TiFmaze/', repo: 'TiFcode/TiFmaze', category: 'Adventure' },
  { id: 'casa', name: 'TiFcasa', icon: '🏠', description: 'Room decorator. Drag furniture to decorate your isometric room.', url: 'https://tifcode.github.io/TiFcasa/', repo: 'TiFcode/TiFcasa', category: 'Art & Creativity' },
  { id: 'mathguide', name: 'TiFmathguide', icon: '📖', description: 'Animated math guide. Learn arithmetic with visual counting guides.', url: 'https://tifcode.github.io/TiFmathguide/', repo: 'TiFcode/TiFmathguide', category: 'Math & Counting' },
  { id: 'bubbles', name: 'TiFbubbles', icon: '🫧', description: 'Pop bubbles to spell words. Learn Romanian vocabulary.', url: 'https://tifcode.github.io/TiFbubbles/', repo: 'TiFcode/TiFbubbles', category: 'Language Learning' },
  { id: 'clock', name: 'TiFclock', icon: '🕐', description: 'Learn to read analog clocks. Interactive time-telling lessons.', url: 'https://tifcode.github.io/TiFclock/', repo: 'TiFcode/TiFclock', category: 'Skills & Learning' },
  { id: 'shapes', name: 'TiFshapes', icon: '🔷', description: 'Sort shapes by color, size, and type. Organize with drag-and-drop.', url: 'https://tifcode.github.io/TiFshapes/', repo: 'TiFcode/TiFshapes', category: 'Cognitive Skills' },
  { id: 'piano', name: 'TiFpiano', icon: '🎹', description: 'Musical keyboard with animal sounds. Play melodies and songs.', url: 'https://tifcode.github.io/TiFpiano/', repo: 'TiFcode/TiFpiano', category: 'Music & Sound' },
  { id: 'paint', name: 'TiFpaint', icon: '🖌️', description: 'Drawing canvas with stamps and colors. Create artwork freely.', url: 'https://tifcode.github.io/TiFpaint/', repo: 'TiFcode/TiFpaint', category: 'Art & Creativity' },
  { id: 'trace', name: 'TiFtrace', icon: '✍️', description: 'Trace the blue picture one segment at a time, then finish the full drawing in orange.', url: 'https://tifcode.github.io/TiFtrace/', repo: 'TiFcode/TiFtrace', category: 'Art & Creativity' },
  { id: 'wordflip', name: 'TiFwordflip', icon: '🇬🇧🇩🇪', description: 'Flip vocabulary cards from English to German, then toss right for correct and left for wrong.', url: 'https://tifcode.github.io/TiFwordflip/', repo: 'TiFcode/TiFwordflip', category: 'Language Learning' },
  { id: 'matchword', name: 'TiFmatchword', icon: '😀', description: 'Potrivește imaginea mare cu cuvântul românesc corect. Joc cu pronunție audio, silabe și feedback vizual.', url: 'https://tifcode.github.io/TiFmatchword/', repo: 'TiFcode/TiFmatchword', category: 'Language Learning' },
  { id: 'gears2', name: 'TiFgears2', icon: '🧩', description: 'Gear challenge game. Solve missions by building working gear trains.', url: 'https://tifcode.github.io/TiFgears2/', repo: 'TiFcode/TiFgears2', category: 'Mechanical Puzzles' },
  { id: 'street', name: 'TiFstreet', icon: '🚗', description: 'Slow 3D-style city driving game. Use the joystick and pedals, respect semaphores, and cruise through town.', url: 'https://tifcode.github.io/TiFstreet/', repo: 'TiFcode/TiFstreet', category: 'Driving & Road Safety' },
  { id: 'motion', name: 'TiFmotion', icon: '⬜', description: 'Place path points, press play, and watch a translucent square glide between them forever.', url: 'https://tifcode.github.io/TiFmotion/', repo: 'TiFcode/TiFmotion', category: 'Motion & Creativity' }
];

function renderGames() {
  const grid = document.getElementById('gamesGrid');
  grid.innerHTML = GAMES.map(game => `<a href="${game.url}" target="_blank" class="game-card"><div class="game-icon">${game.icon}</div><div class="game-content"><h2>${game.name}</h2><p>${game.description}</p><span class="game-link">Play Now →</span><div class="game-repo">github.com/${game.repo}</div></div></a>`).join('');
}

function renderCategories() {
  const categories = {};
  GAMES.forEach(game => {
    if (!categories[game.category]) categories[game.category] = [];
    categories[game.category].push(game.name);
  });
  const catView = document.getElementById('categoriesView');
  catView.innerHTML = Object.keys(categories).sort().map(cat => `<div class="category-item"><h3>${cat}</h3><ul>${categories[cat].map(name => `<li>✓ ${name}</li>`).join('')}</ul></div>`).join('');
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => { renderGames(); renderCategories(); });
} else {
  renderGames();
  renderCategories();
}
</script>

</body>
</html>
